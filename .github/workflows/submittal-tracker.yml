name: Submittal Tracker

on:
  schedule:
    # Mon + Thu at 7:00 AM CDT (UTC-5) = 12:00 UTC
    - cron: "0 12 * * 1,4"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: submittal_tracker/requirements.txt

      - name: Install dependencies
        run: pip install -r submittal_tracker/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Create .env
        working-directory: pz_tracker
        run: |
          mkdir -p .
          cat <<EOF > .env
          REPLIT_WEBHOOK_URL=${{ secrets.REPLIT_WEBHOOK_URL }}
          PIPELINE_SECRET=${{ secrets.PIPELINE_SECRET }}
          GOOGLE_SERVICE_ACCOUNT_JSON=service_account.json
          EOF

      - name: Write Google service account credentials
        working-directory: pz_tracker
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Run Submittal Tracker
        run: >
          python -m submittal_tracker.main
          --city Frisco
          --sheet-id ${{ secrets.FRISCO_SHEET_ID }}
