name: P&Z Tracker

on:
  schedule:
    # Mon + Thu at 6:00 AM CDT (UTC-5) = 11:00 UTC
    - cron: '0 11 * * 1,4'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pz_tracker/requirements.txt

      - name: Install dependencies
        run: pip install -r pz_tracker/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Create .env
        working-directory: pz_tracker
        run: |
          cat <<EOF > .env
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          REPLIT_WEBHOOK_URL=${{ secrets.REPLIT_WEBHOOK_URL }}
          PIPELINE_SECRET=${{ secrets.PIPELINE_SECRET }}
          GOOGLE_SERVICE_ACCOUNT_JSON=service_account.json
          EOF

      - name: Write Google service account credentials
        working-directory: pz_tracker
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Run P&Z Tracker
        working-directory: pz_tracker
        run: python main.py

      - name: Upload Excel output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pz-tracker-output-${{ github.run_number }}
          path: pz_tracker/output/*.xlsx
          retention-days: 14
